openapi: 3.0.3
info:
  title: IANexora
  version: 1.0.0
  description: API REST com chat integrado ao Gemini e fluxo de autenticação via comandos no chat.
servers:
  - url: http://localhost:8082
    description: Docker Local
  - url: http://localhost/IANexora/public
    description: XAMPP Local
paths:
  /api/health:
    get:
      summary: Health check
      description: Retorna status da API.
      responses:
        '200':
          description: API online
          content:
            application/json:
              example:
                success: true
                message: API online.
                data:
                  status: ok
  /api/chat:
    post:
      summary: Chat contextual com Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
            example:
              message: Onde fica o botão de login?
      responses:
        '200':
          description: Resposta da IA
          content:
            application/json:
              example:
                success: true
                message: Resposta gerada com sucesso.
                data:
                  message: Onde fica o botão de login?
                  context_documents: []
                  answer: O botão de login está no canto superior direito...
                  provider: gemini
components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: string
