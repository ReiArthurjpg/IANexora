services:
  # PHP API Service para IANexora
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ianexora-api
    container_name: ianexora-api
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: api
      SERVICE_TAGS: dev
      DB_HOST: authnexora-db  # Conecta ao container de DB compartilhado do AuthNexora
      DB_PORT: 3306
      DB_DATABASE: ai_knowledge_base
      DB_USERNAME: root
      DB_PASSWORD: rootpassword
    volumes:
      - .:/var/www
    networks:
      - authnexora-network

  # Nginx Web Server Service para IANexora
  web:
    image: nginx:alpine
    container_name: ianexora-web
    restart: unless-stopped
    tty: true
    ports:
      - "8082:80"             # Porta 8082 para evitar conflito com AuthNexora web (8080)
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - authnexora-network
    depends_on:
      - api

networks:
  authnexora-network:
    name: authnexora_authnexora-network
    external: true
